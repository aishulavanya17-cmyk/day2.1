<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Advanced Student Registration Form</title>

  <!-- FONT AWESOME ICON -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="form-box">

  <!-- LOGO -->
  <div class="logo-box">
    <img src="logo.png" class="logo">
  </div>

  <!-- HEADING -->
  <h1>Student Registration Form</h1>

  <p>Please fill all details carefully</p>

  <!-- PROGRESS BAR -->
  <progress value="70" max="100"></progress>

  <form autocomplete="off">

    <!-- PERSONAL DETAILS -->
    <fieldset>

      <legend>Personal Details</legend>

      <!-- NAME -->
      <label>
        <i class="fa fa-user"></i>
        Full Name *
      </label>

      <input type="text"
      placeholder="Enter your full name"
      required>

      <!-- EMAIL -->
      <label>
        <i class="fa fa-envelope"></i>
        Email Address *
      </label>

      <input type="email"
      placeholder="Enter your email"
      required>

      <!-- MOBILE -->
      <label>
        <i class="fa fa-phone"></i>
        Mobile Number *
      </label>

      <input type="tel"
      pattern="[0-9]{10}"
      placeholder="Enter 10 digit number"
      required>

      <!-- DATE -->
      <label>
        <i class="fa fa-calendar"></i>
        Date of Birth
      </label>

      <input type="date"
      min="2000-01-01"
      max="2026-12-31">

      <!-- GENDER -->
      <label>
        <i class="fa fa-user-group"></i>
        Gender
      </label>

      <div class="gender">

        <label>
          <input type="radio" name="gender">
          Male
        </label>

        <label>
          <input type="radio" name="gender">
          Female
        </label>

        <label>
          <input type="radio" name="gender">
          Other
        </label>

      </div>

    </fieldset>

    <!-- EDUCATION -->
    <fieldset>

      <legend>Education Details</legend>

      <!-- COLLEGE -->
      <label>
        <i class="fa fa-building"></i>
        College Name
      </label>

      <input type="text"
      placeholder="Enter college name">

      <!-- DEPARTMENT -->
      <label>
        <i class="fa fa-book"></i>
        Department
      </label>

      <select>

        <optgroup label="Engineering">

          <option>CSE</option>
          <option>IT</option>
          <option>ECE</option>
          <option>EEE</option>

        </optgroup>

      </select>

      <!-- YEAR -->
      <label>
        <i class="fa fa-graduation-cap"></i>
        Year of Study
      </label>

      <select>

        <option>1st Year</option>
        <option>2nd Year</option>
        <option>3rd Year</option>
        <option>Final Year</option>

      </select>

    </fieldset>

    <!-- SKILLS -->
    <fieldset>

      <legend>Skills</legend>

      <label>
        <i class="fa fa-code"></i>
        Technical Skills
      </label>

      <div class="skills">

        <label><input type="checkbox"> HTML</label>

        <label><input type="checkbox"> CSS</label>

        <label><input type="checkbox"> JavaScript</label>

        <label><input type="checkbox"> Java</label>

        <label><input type="checkbox"> Python</label>

        <label><input type="checkbox"> SQL</label>

      </div>

    </fieldset>

    <!-- ADDRESS -->
    <fieldset>

      <legend>Address Details</legend>

      <!-- ADDRESS -->
      <label>
        <i class="fa fa-location-dot"></i>
        Address
      </label>

      <textarea
      placeholder="Enter your address"></textarea>

      <!-- CITY -->
      <label>
        <i class="fa fa-city"></i>
        City
      </label>

      <input list="cities"
      placeholder="Select city">

      <datalist id="cities">

        <option value="Chennai">
        <option value="Coimbatore">
        <option value="Madurai">
        <option value="Salem">

      </datalist>

      <!-- PINCODE -->
      <label>
        <i class="fa fa-map-pin"></i>
        Pincode
      </label>

      <input type="number"
      placeholder="Enter pincode">

    </fieldset>

    <!-- FILE UPLOAD -->
    <fieldset>

      <legend>Profile Details</legend>

      <!-- PHOTO -->
      <label>
        <i class="fa fa-image"></i>
        Upload Profile Photo
      </label>

      <input type="file"
      accept="image/*">

      <!-- RESUME -->
      <label>
        <i class="fa fa-file"></i>
        Upload Resume
      </label>

      <input type="file">

      <!-- LINKEDIN -->
      <label>
        <i class="fa fa-link"></i>
        LinkedIn Profile
      </label>

      <input type="url"
      placeholder="Enter LinkedIn link">

    </fieldset>

    <!-- FEEDBACK -->
    <fieldset>

      <legend>Feedback</legend>

      <label>
        <i class="fa fa-message"></i>
        Why do you want to join?
      </label>

      <textarea
      placeholder="Write your answer"></textarea>

    </fieldset>

    <!-- CONFIRM -->
    <div class="confirm">

      <label>
        <input type="checkbox" required>
        I confirm all details are correct
      </label>

    </div>

    <!-- BUTTON -->
    <div class="btn-group">

      <button type="submit">
        Submit
      </button>

      <button type="reset">
        Reset
      </button>

    </div>

  </form>

</div>

</body>
</html>
